<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Juego Cultural</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    color: #222;
    text-align: center;
    padding: 20px;
}

h2 {
    color: #003e6b;
    margin-bottom: 20px;
}

#quiz-container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button {
    padding: 10px 20px;
    margin: 10px;
    background: #003e6b;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #005c99;
}

#score {
    font-size: 20px;
    margin-top: 15px;
    color: #005c99;
}
</style>
</head>
<body>

<h2>Mini Juego Cultural</h2>

<div id="quiz-container">
    <p id="question"></p>
    <div id="choices"></div>
    <p id="score"></p>
</div>

<script>
const quiz = [
    {
        question: "¿En qué continente se encuentra la Sagrada Familia?",
        choices: ["Asia", "Europa", "América", "Oceanía"],
        answer: "Europa"
    },
    {
        question: "¿Qué país contiene el Santuario Historico de Machu Picchu?",
        choices: ["Brasil", "Perú", "México", "Argentina"],
        answer: "Perú"
    },
    {
        question: "¿Segundo continente con mas habitantes?",
        choices: ["Oceanía", "America", "Europa", "África"],
        answer: "África"
    },
    {
        question: "¿Dónde está la Gran Muralla?",
        choices: ["Japón", "China", "India", "Egipto"],
        answer: "China"
    },
    {
        question: "¿Qué cordillera separa Europa de Asia?",
        choices: ["Los montes Urales", "Everest", "Cordillera de los Andes", "Los Pirineos"],
        answer: "Los montes Urales"
    },
    {
        question: "¿En que continente se encuentra el Rio Nilo?",
        choices: ["Asia", "África", "Europa", "América"],
        answer: "África"
    },
    {
        question: "¿Qué continente tiene a Australia?",
        choices: ["Oceanía", "África", "Europa", "América"],
        answer: "Oceanía"
    },
    {
        question: "¿En qué continente se encuentran las pirámides de Giza?",
        choices: ["África", "Asia", "Europa", "América"],
        answer: "África"
    }
];

let current = 0;
let score = 0;

function showQuestion() {
    const q = quiz[current];
    document.getElementById("question").textContent = q.question;
    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";
    q.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);
        choicesDiv.appendChild(btn);
    });
    document.getElementById("score").textContent = "";
}

function checkAnswer(choice) {
    if(choice === quiz[current].answer){
        score++;
        alert("¡PERFECTO!");
    } else {
        alert(`Incorrecto. La respuesta correcta es: ${quiz[current].answer}`);
    }
    current++;
    if(current < quiz.length){
        showQuestion();
    } else {
        document.getElementById("quiz-container").innerHTML = `
            <h2>Juego terminado</h2>
            <p>Puntuación final: ${score} de ${quiz.length}</p>
            <button onclick="restart()">Jugar de nuevo</button>
            <button onclick="goMenu()">Volver al menú</button>
        `;
    }
}

function restart() {
    window.location.href = "minijuego.html";
}

function goMenu() {
    window.location.href = "HistoriasYCulturas.html";
}

showQuestion();
</script>

</body>
</html>
